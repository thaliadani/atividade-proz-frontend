<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/assets/styles/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css" />
    <title>Login</title>
</head>

<body>
    <main>
        <h1>Login</h1>
        <form id="form-login" method="post">
            <div class="login-usuario">
                <input type="text" placeholder="Usuário" name="usuario" id="usuario" maxlength="12" required>
            </div>
            <div class="login-senha">
                <input type="password" name="senha" id="senha" maxlength="8" size='8' placeholder="Senha" required>

                <span id="mostrar-senha" class="iconoir-eye-closed"></span>

            </div>
            <button type="submit" id="btn-entrar">Entrar</button>
        </form>
    </main>

    <script src="./src/assets/scripts/login.js"></script>
</body>

</html>
